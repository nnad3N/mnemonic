services:
  db:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mnemonic
      POSTGRES_PASSWORD: mnemonic
      POSTGRES_DB: mnemonic
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mnemonic -d mnemonic"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
